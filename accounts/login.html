{% extends 'base.html' %}
{% load static %}

{% block title %}Login - WasteWatch{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 450px;">
    <div class="form-header">
        <h2>🔐 Welcome Back</h2>
        <p>Login to track your reports and requests</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="username">
                Username or Email <span class="required">*</span>
            </label>
            <input type="text" id="username" name="username" class="form-control" 
                   placeholder="Enter your username or email..." required>
        </div>
        
        <div class="form-group">
            <label for="password">
                Password <span class="required">*</span>
            </label>
            <input type="password" id="password" name="password" class="form-control" 
                   placeholder="Enter your password..." required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large btn-block">
            Login
        </button>
        
        <p class="text-center mt-3">
            Don't have an account? <a href="#" style="color: var(--primary-color); font-weight: 500;">Sign Up</a>
        </p>
    </form>
</div>
{% endblock %}
